name: .NET Core Unit Tests with Report

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: linux

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    # °õ¦ę“śøÕØĆæé„X trx ĄÉ
    - name: Run unit tests
      run: dotnet test --logger "trx;LogFileName=test_results.trx" --results-directory TestResults

    # ¦wøĖ ReportGenerator ¤uØć
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Āą“« trx ¦Ø HTML ³ų§i
    - name: Generate HTML report
      run: reportgenerator -reports:TestResults/*.trx -targetdir:TestResults/report -reporttypes:Html

    # ¤W¶Ē“śøÕµ²ŖG»P HTML ³ų§i
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: TestResults
